name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write

jobs:
  build-wheels:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --generate-stubs

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: target/wheels/*

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: find dist -type f -name "*.whl" -exec cp {} . \;

      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: "*.whl"
